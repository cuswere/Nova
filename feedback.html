<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Send feedback or a suggestion to Praxis Nova.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='black'/%3E%3Cpath d='M16 2 L19 13 L30 16 L19 19 L16 30 L13 19 L2 16 L13 13 Z' fill='white'/%3E%3C/svg%3E">
    <title>Praxis Nova</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="content-wrapper">
        <div class="screen-refresh" aria-hidden="true"><span></span><span></span><span></span><span></span></div>

        <header class="field page-header">
            <h1 class="page-title"><span class="title">Feedback</span></h1>
            <nav class="title-options" aria-label="Page navigation">
                <a href="index.html" class="title-option">Home</a>
            </nav>
        </header>

        <div class="field feedback">
            <form class="feedback-form" novalidate>
                <p class="feedback-intro">Please suggest anything | or Report an issue</p>

                <div class="form-row name">
                    <label for="name">Name (optional)</label>
                    <input class="form-input" type="text" id="name" name="name" />
                </div>

                <div class="form-row">
                    <label for="suggestion">Message</label>
                    <textarea class="form-textarea" id="suggestion" name="suggestion" required rows="6" placeholder=""></textarea>
                </div>

                <div class="form-row form-actions">
                    <button class="form-submit" type="submit">Send Feedback</button>
                    <p class="form-status" role="status" aria-live="polite"></p>
                </div>
            </form>
        </div>
    </div>
    <script src="app.js" defer></script>
</body>
</html>
