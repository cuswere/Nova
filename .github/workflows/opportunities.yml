name: Refresh opportunities

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Source to refresh (scheduled runs always refresh all sources)'
        required: true
        default: all
        type: choice
        options:
          - all
          - creative_capital
          - creative_west
          - hyperallergic
          - transartists

permissions:
  contents: write

concurrency:
  group: opportunities-refresh
  cancel-in-progress: false

jobs:
  gate:
    # Manual runs always proceed. Scheduled runs only proceed if the
    # AUTOMATION_ACTIVE repo variable is "true" and today matches the
    # FREQUENCY_DAYS cadence. Edit both under Settings > Secrets and
    # variables > Actions > Variables - no code changes needed.
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          AUTOMATION_ACTIVE: ${{ vars.AUTOMATION_ACTIVE }}
          FREQUENCY_DAYS: ${{ vars.FREQUENCY_DAYS }}
        run: |
          if [ "$EVENT_NAME" != "schedule" ]; then
            echo "Manual run; proceeding."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          active="${AUTOMATION_ACTIVE:-true}"
          if [ "$active" != "true" ]; then
            echo "AUTOMATION_ACTIVE=$active; skipping scheduled run."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          freq="${FREQUENCY_DAYS:-1}"
          if ! [[ "$freq" =~ ^[0-9]+$ ]] || [ "$freq" -lt 1 ]; then
            echo "FREQUENCY_DAYS='$freq' is invalid; defaulting to 1 (daily)."
            freq=1
          fi

          day_number=$(( $(date -u +%s) / 86400 ))
          remainder=$(( day_number % freq ))
          if [ "$remainder" -eq 0 ]; then
            echo "Day $day_number is due (mod $freq == 0); proceeding."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Day $day_number not due (mod $freq == $remainder); skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  refresh:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5.4-nano
      AI_ENRICH_LIMIT: '30'
      OPPORTUNITY_SOURCE: ${{ inputs.source || 'all' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test

      - name: Check credentials
        shell: bash
        run: |
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::GOOGLE_SERVICE_ACCOUNT_JSON is not configured."
            exit 1
          fi
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::warning::OPENAI_API_KEY is not configured; unresolved candidates will remain in review."
          fi

      - run: npm run sync-opportunities
      - run: npm run publish-data

      - name: Commit updated public catalogue
        shell: bash
        run: |
          if git diff --quiet -- data/opportunities.json; then
            echo "No public catalogue changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/opportunities.json
          git commit -m "Refresh published opportunities"
          git push
