name: Refresh opportunities

on:
  schedule:
    - cron: '0 14 * * 2,5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: opportunities-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5.4-nano
      AI_ENRICH_LIMIT: '30'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test

      - name: Check credentials
        shell: bash
        run: |
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::GOOGLE_SERVICE_ACCOUNT_JSON is not configured."
            exit 1
          fi
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::warning::OPENAI_API_KEY is not configured; unresolved candidates will remain in review."
          fi

      - run: npm run sync-opportunities
      - run: npm run publish-data

      - name: Commit updated public catalogue
        run: |
          if git diff --quiet -- data/opportunities.json; then
            echo "No public catalogue changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/opportunities.json
          git commit -m "Refresh published opportunities"
          git push
