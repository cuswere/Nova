name: Publish opportunities

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: opportunities-refresh
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test

      - name: Check credentials
        shell: bash
        run: |
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::GOOGLE_SERVICE_ACCOUNT_JSON is not configured."
            exit 1
          fi

      - run: npm run publish-data

      - name: Commit updated public catalogue
        shell: bash
        run: |
          if git diff --quiet -- data/opportunities.json; then
            echo "No public catalogue changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/opportunities.json
          git commit -m "Publish opportunities from Sheet"
          git push
