<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Praxis Nova — an updating roster of grants, exhibitions, residencies, and other opportunities for artists.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='black'/%3E%3Cpath d='M16 2 L19 13 L30 16 L19 19 L16 30 L13 19 L2 16 L13 13 Z' fill='white'/%3E%3C/svg%3E">
    <title>Praxis Nova</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="content-wrapper">
        <div class="screen-refresh" aria-hidden="true"><span></span><span></span><span></span><span></span></div>

        <header class="field page-header">
            <h1 class="page-title"><span class="title">Home</span></h1>
        </header>

        <div class="home-wordmark" aria-hidden="true"><span>Praxis</span><span>nova</span></div>

        <div class="field options-container">
            <div class="opportunity-group">
                <div class="option-btn-container">
                    <span class="option-btn">
                        <a href="opportunities.html">Opportunities</a>
                        <button class="info" type="button" aria-expanded="false" aria-controls="opportunities-details">+</button>
                    </span>
                    <div class="option-details" id="opportunities-details">
                        <div class="option-details-row">
                            <a class="sublink" href="opportunities.html?type=grant">Grants</a>
                            <span class="sep" aria-hidden="true">+</span>
                            <a class="sublink" href="opportunities.html?type=exhibition">Exhibitions</a>
                            <span class="sep" aria-hidden="true">+</span>
                            <a class="sublink" href="opportunities.html?type=residency">Residencies</a>
                            <span class="sep" aria-hidden="true">+</span>
                            <span class="sublink">More</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="option-btn-container">
                <span class="option-btn"><a href="feedback.html">Give<br>Feedback</a></span>
            </div>
        </div>

        <!-- Reserved mount point for the future interactive nova mascot (see README). -->
        <div id="mascot-root"></div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
