<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse an updating roster of grants, exhibitions, residencies, and other opportunities for artists.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='black'/%3E%3Cpath d='M16 2 L19 13 L30 16 L19 19 L16 30 L13 19 L2 16 L13 13 Z' fill='white'/%3E%3C/svg%3E">
    <title>Praxis Nova</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="content-wrapper">
        <div class="screen-refresh" aria-hidden="true"><span></span><span></span><span></span><span></span></div>

        <header class="field page-header">
            <h1 class="page-title"><span class="title">Opportunities</span></h1>
            <nav class="title-options" aria-label="Page navigation">
                <a href="index.html" class="title-option">Home</a>
            </nav>
        </header>

        <div class="field columns">
            <div class="repo">
                <div class="repobox"></div>
            </div>
            <div class="filters">
                <div class="filter-selectors">
                    <div class="custom-select" aria-hidden="false">
                        <div class="custom-selected" tabindex="0" aria-haspopup="listbox" aria-expanded="false"><span class="custom-selected-label">Category</span></div>
                        <ul class="custom-options" role="listbox" aria-hidden="true"></ul>
                    </div>
                    <select class="filter-dropdown visually-hidden" name="type" tabindex="-1" aria-hidden="true">
                        <option disabled selected value="TYPE_LABEL">Type</option>
                    </select>
                    <div>
                        <label class="filter-dropdown checkbox-label">
                            <input id="hide-fees-toggle" class="checkbox-input" type="checkbox" />
                            <span class="checkbox-text">Hide Fees</span>
                        </label>
                    </div>
                </div>
                <div class="filters-divider">
                    <div class="filters-title">Filters</div>
                    <div class="applied-filters">
                        <div class="filter-item">none</div>
                    </div>
                </div>
            </div>  
        </div>
    </div>
    <script src="app.js" defer></script>
</body>
</html>
